<!DOCTYPE html>
<html lang="en">

    <head>
        <title>Scoreboard</title>
        <style>
            body {
                background-color: lightblue;
            }

            h1 {
                text-align: center;
                color: red;
                font-family: arial;
            }

            h3 {
                margin-bottom: 0px;
            }

            table {
                border: 2px solid black;
                border-collapse: collapse;
                margin-left: auto;
                margin-right: auto;
                text-align: center;
                margin-bottom: 5em;
                margin-top: 5em
            }

            td {
                border: 2px solid black;
            }
        </style>
    </head>

    <body>
        <h1>Welcome to Scoreboard</h1>
        <p>This week, Team 1 faces off against Team 2. </p>
        <table>
            <tr>
                <td class="team">Team 1</td>
                <td class="team">Team 2</td>
            </tr>
            <tr>
                <td id="score1">0</td>
                <td id="score2">0</td>
            </tr>
            <tr>
                <td>
                    <button id="add1">+1</button>
                </td>
                <td>
                    <button id="add2">+1</button>
                </td>
            </tr>
        </table>

        <h3>Team 1 Players</h3>
        <ol>
            <li>John</li>
            <li>Charlie</li>
            <li>Alice</li>
        </ol>

        <footer>Made in CS50 Section 8</footer>

        <script>
            let team1 = 0;
            let team2 = 0;

            document.querySelector('#add1').onclick = function() {
                team1 += 1;
                document.querySelector('#score1').innerHTML = team1;
                if (team1 == 10) {
                    alert("Team 1 has won!")
                }
            }

            document.querySelector('#add2').onclick = function() {
                team2 += 1;
                document.querySelector('#score2').innerHTML = team2;
                if (team2 == 10) {
                    alert("Team 2 has won!")
                }
            }
        </script>
    </body>

</html>
