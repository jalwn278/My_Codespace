{% extends "layout.html" %}

{% block title %}
    Registrants
{% endblock %}

{% block main %}
    <form action="/register" method="post">
        <input autocomplete="off" autofocus name="username" placeholder="Name" type="text">
        <input autocomplete="off" autofocus name="password" placeholder="Password" type="password">
        <input autocomplete=“off” autofocus name="confirmation" placeholder="Repeat your password" type="password">
        <button type="submit">Register</button>
    </form>
{% endblock %}
